---
layout: default
previousnext: True
tagbar: True
---

<div class="row">
  <div class="col-xs-12">

    <div class="posts">
      <article class="post">
        <h1>{{ page.title }}</h1>
        <p class="postdate">{{ page.date | date: '%B %d, %Y' }}</p>
        <p class="postcontent">
        {{ content }}
        </p>
      </article>
    </div>

  </div>
</div>
